<svg width="1200" height="620" viewBox="0 0 1200 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
<title id="title">Claude Code architecture map</title>
<desc id="desc">A dark technical diagram for Steven Chou's AI agent engineering work.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#020617"/><stop offset="0.5" stop-color="#0f172a"/><stop offset="1" stop-color="#111827"/></linearGradient>
  <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#22d3ee"/><stop offset="1" stop-color="#818cf8"/></linearGradient>
  <linearGradient id="green" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#34d399"/><stop offset="1" stop-color="#22d3ee"/></linearGradient>
  <filter id="glow"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="1" opacity="0.65"/></pattern>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#67e8f9"/></marker>
</defs>
<rect width="1200" height="620" rx="28" fill="url(#bg)"/>
<rect width="1200" height="620" rx="28" fill="url(#grid)" opacity="0.8"/>

<text x="56" y="78" fill="#f8fafc" font-family="Inter, system-ui" font-size="36" font-weight="800">Claude Code Architecture Map</text>
<text x="56" y="112" fill="#94a3b8" font-family="Inter, system-ui" font-size="18">Unofficial source-map research: npm package → restored sources → readable agent runtime tutorial.</text>
<g font-family="Inter, system-ui" font-size="15">
  <rect x="70" y="180" width="190" height="82" rx="16" fill="#1e293b" stroke="#94a3b8"/><text x="96" y="214" fill="#e2e8f0" font-weight="700">npm package</text><text x="96" y="240" fill="#94a3b8">cli.js + cli.js.map</text>
  <rect x="330" y="180" width="190" height="82" rx="16" fill="#082f49" stroke="#22d3ee"/><text x="356" y="214" fill="#e0f2fe" font-weight="700">source map restore</text><text x="356" y="240" fill="#7dd3fc">4,756 files</text>
  <rect x="590" y="180" width="190" height="82" rx="16" fill="#052e2b" stroke="#34d399"/><text x="616" y="214" fill="#dcfce7" font-weight="700">runtime concepts</text><text x="616" y="240" fill="#86efac">loop · tools · safety</text>
  <rect x="850" y="180" width="270" height="82" rx="16" fill="#3b1b55" stroke="#a78bfa"/><text x="876" y="214" fill="#f3e8ff" font-weight="700">tutorial website</text><text x="876" y="240" fill="#c4b5fd">8 chapters + research notes</text>
</g>
<path d="M260 221 H322" stroke="#67e8f9" stroke-width="2" marker-end="url(#arrow)"/><path d="M520 221 H582" stroke="#67e8f9" stroke-width="2" marker-end="url(#arrow)"/><path d="M780 221 H842" stroke="#67e8f9" stroke-width="2" marker-end="url(#arrow)"/>
<g transform="translate(120 350)" font-family="Inter, system-ui">
  <rect width="960" height="150" rx="24" fill="#0f172a" stroke="#334155"/>
  <text x="40" y="46" fill="#f8fafc" font-size="24" font-weight="800">Agent loop mental model</text>
  <text x="40" y="86" fill="#cbd5e1" font-size="17">model response → tool call → permission gate → shell/file operation → tool result → next model call</text>
  <text x="40" y="122" fill="#94a3b8" font-size="15">The repo turns minified runtime evidence into a learnable architecture map for AI coding agents.</text>
</g>
<text x="1166" y="592" fill="#64748b" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" text-anchor="end">stevenchouai · trace over vibes</text>
</svg>
